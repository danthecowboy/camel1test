# ─────────────────────────────────────────────────────────────
#  Camel Route: Kafka XML → extract text → write to text file
# ─────────────────────────────────────────────────────────────
#
#  Expected XML message format:
#    <message>
#      <content>Hello from Apache Camel via Kafka!</content>
#      <timestamp>2026-05-10</timestamp>
#    </message>
# ─────────────────────────────────────────────────────────────

# In Camel 4.x YAML DSL, `steps` lives inside `from`, not next to it.
- from:
    uri: "kafka:xml-topic"
    parameters:
      brokers: "{{kafka.brokers}}"
      groupId: "camel-demo-group"
      autoOffsetReset: "earliest"
    steps:
      - log:
          message: "Received XML from Kafka: ${body}"
          loggingLevel: "INFO"

      # Extract all text content from the XML body via XPath.
      # resultType is required — without it Camel expects a NodeList
      # and throws an error when string() returns a String.
      - setBody:
          expression:
            xpath:
              expression: "string(//message)"
              resultType: "java.lang.String"

      - log:
          message: "Extracted text: ${body}"
          loggingLevel: "INFO"

      # Set the output filename via header — avoids URL-encoding of the Simple expression
      - setHeader:
          name: CamelFileName
          expression:
            simple: "message-${date:now:yyyyMMdd-HHmmss-SSS}.txt"

      # Write the extracted text to the output directory
      - to:
          uri: "file:{{output.dir}}"
