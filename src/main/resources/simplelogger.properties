# ── slf4j-simple configuration ────────────────────────────────
# Show timestamp + level in every line
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=HH:mm:ss.SSS

# Default level for everything
org.slf4j.simpleLogger.defaultLogLevel=warn

# Show our Camel route logs
org.slf4j.simpleLogger.log.org.apache.camel=info

# Suppress verbose Kafka client / coordinator chatter
org.slf4j.simpleLogger.log.org.apache.kafka=warn
